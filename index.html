<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cartographie</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; }
        .carte {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .carte a {
            font-size: 18px;
            color: #0066cc;
            text-decoration: none;
        }
        .carte a:hover { text-decoration: underline; }
        .carte p { color: #666; margin: 5px 0 0 0; }
    </style>
</head>
<body>
    <h1>🗺️ Cartographie</h1>
    <div class="carte">
        <a href="densite/">📊 Densité de population</a>
        <p>Carte de densité de population par commune</p>
    </div>
    <div class="carte">
        <a href="Inondations/">💧 Inondations</a>
        <p>Carte des interventions inondations</p>
    </div>
</body>
</html>
